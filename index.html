<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Churt Jhayzer Peralta</title>
    <style>
        body {
            background-color: #f0f8ff;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }
        .profile {
            max-width: 400px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            text-align: center;
        }
        .avatar {
            width: 120px;
            height: 120px;
            background-color: #e74c3c;
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            color: white;
        }
        h1 {
            color: #333;
            margin: 0 0 10px 0;
            font-size: 24px;
        }
        .tagline {
            color: #666;
            margin: 0 0 30px 0;
            font-size: 16px;
        }
        
        .social {
            margin-top: 25px;
        }
        .social-icons {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .social-icon {
            width: 50px;
            height: 50px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            text-decoration: none;
        }
        .facebook { background-color: #3b5998; }
        .messenger { background-color: #0084ff; }
        .instagram { background: linear-gradient(45deg, #f09433, #e6683c); }
        .tiktok { background-color: #000; }
        
        .btn {
            background-color: #3498db;
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            text-decoration: none;
            display: inline-block;
            margin-top: 20px;
        }
        .btn:hover {
            background-color: #2980b9;
        }
        
        @media (max-width: 500px) {
            .profile { margin: 10px; padding: 20px; }
            .social-icons { gap: 12px; }
        }
    </style>
</head>
<body>
    <div class="profile">
        <!-- Basketball Icon (TAAS) -->
        <div class="avatar">
            🏀
        </div>
        
        <!-- Name and Title -->
        <h1>Churt Jhayzer Peralta</h1>
        <p class="tagline">Basketball Player | Athlete</p>
        
        <!-- Social Media (BABA) -->
        <div class="social">
            <h3 style="color: #333; margin-bottom: 15px;">📱 Follow Me</h3>
            <div class="social-icons">
                <a href="#" class="social-icon facebook" title="Facebook">
                    f
                </a>
                <a href="#" class="social-icon messenger" title="Messenger">
                    💬
                </a>
                <a href="#" class="social-icon instagram" title="Instagram">
                    📷
                </a>
                <a href="#" class="social-icon tiktok" title="TikTok">
                    🎵
                </a>
            </div>
        </div>
        
        <!-- Button -->
